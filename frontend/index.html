<!-- W1 카드 예시 (w2, w3, w4도 동일 패턴 적용, prefix만 변경) -->
<div class="card-flip-wrapper" id="flip-w1" onclick="toggleFlip('w1')">
  <div class="card-flip-inner">

    <!-- 앞면 -->
    <div class="card-front" id="front-w1">
      <div class="card-header">
        <span class="card-icon">📉</span>
        <div>
          <div class="card-title">W1 · 가중치 25%</div>
          <div class="card-subtitle">선도주 압축 지표</div>
        </div>
        <span class="card-weight-badge" id="weight-w1">가중치 25%</span>
        <span class="card-score-badge grade-green" id="score-w1">—</span>
      </div>
      <div class="chart-wrapper"><canvas id="bar-w1"></canvas></div>
      <div class="signals-list" id="signals-w1"></div>
      <!-- 앞면 본문: buildFrontContent 가 여기에 삽입 -->
      <div id="front-body-w1"></div>
      <div class="flip-hint">🔄 클릭하면 지표 해설 →</div>
    </div>

    <!-- 뒷면 -->
    <div class="card-back" id="back-w1">
      <div class="back-header">
        <span class="back-title">📉 선도주 압축 — 지표 해설</span>
        <button class="flip-btn" onclick="event.stopPropagation();toggleFlip('w1')">◀ 돌아가기</button>
      </div>
      <!-- 뒷면 본문: buildBackContent 가 여기에 삽입 -->
      <div id="back-body-w1"></div>
    </div>

  </div>
</div>
