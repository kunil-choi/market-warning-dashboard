name: Daily Market Data Update

on:
  schedule:
    # 매일 UTC 22:00 (한국시간 오전 7시) 실행
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create data directory
        run: mkdir -p frontend/data

      - name: Run Data Pipeline
        # ✅ 핵심 수정: working-directory 없이 루트에서 실행
        # ✅ PYTHONPATH를 명시적으로 레포 루트로 설정
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python backend/run_pipeline.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit and push data files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add frontend/data/
          # 변경사항이 있을 때만 커밋 (없으면 에러 방지)
          git diff --staged --quiet || git commit -m "📊 Auto-update market data [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push
