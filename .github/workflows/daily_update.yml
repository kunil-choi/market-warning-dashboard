name: Daily Market Warning Dashboard Update

on:
  schedule:
    - cron: "0 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Data Pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m backend.data_pipeline.run_pipeline

      - name: Commit Updated Data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_scores.json data/history.jsonl
          git diff --staged --quiet || git commit -m "📊 자동 업데이트: $(date +'%Y-%m-%d %H:%M KST')"
          git push
