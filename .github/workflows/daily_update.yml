name: Daily Market Warning Dashboard Update

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install Dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Data Pipeline
        env:
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ✅ 수정: 레포 루트를 PYTHONPATH에 추가 (backend 패키지 인식)
          PYTHONPATH: ${{ github.workspace }}
        # ✅ 수정: 실제 파일 경로로 직접 실행
        run: python backend/data_pipeline/run_pipeline.py

      - name: Commit Updated Data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ✅ 수정: 실제 저장 경로인 frontend/data/ 로 변경
          git add frontend/data/latest_scores.json frontend/data/history.jsonl frontend/data/latest_validation.json
          git diff --staged --quiet || git commit -m "📊 자동 업데이트: $(date +'%Y-%m-%d %H:%M KST')"
          git push
